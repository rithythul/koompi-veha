name: Release veha-edge

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: veha-edge-x86_64-linux
            use_cross: false
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl-shared.tar.xz
          - target: aarch64-unknown-linux-gnu
            artifact: veha-edge-aarch64-linux
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Ubuntu apt only has FFmpeg 6.x; download FFmpeg 8 shared libs from BtbN.
      # FFMPEG_DIR is picked up by ffmpeg-sys-next's build script.
      - name: Install FFmpeg 8 dev libs (x86_64)
        if: matrix.use_cross == false
        run: |
          wget -q -O /tmp/ffmpeg.tar.xz "${{ matrix.ffmpeg_url }}"
          mkdir -p /opt/ffmpeg8
          tar -xf /tmp/ffmpeg.tar.xz --strip-components=1 -C /opt/ffmpeg8
          rm /tmp/ffmpeg.tar.xz
          echo "FFMPEG_DIR=/opt/ffmpeg8" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/ffmpeg8/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/opt/ffmpeg8/lib" >> $GITHUB_ENV

      # rodio uses cpal which links against ALSA on Linux
      - name: Install ALSA dev libs (x86_64)
        if: matrix.use_cross == false
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: Install cross (aarch64 only)
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native x86_64)
        if: matrix.use_cross == false
        run: cargo build --release -p veha-edge

      # FFMPEG_DIR is passed into the cross container via Cross.toml [env] passthrough.
      # The pre-build hook in Cross.toml installs FFmpeg 8 + ALSA libs inside the container.
      - name: Build (cross aarch64)
        if: matrix.use_cross == true
        run: cross build --release -p veha-edge --target ${{ matrix.target }}
        env:
          FFMPEG_DIR: /opt/ffmpeg8

      - name: Rename artifact
        run: |
          if [ -f "target/${{ matrix.target }}/release/veha-edge" ]; then
            cp "target/${{ matrix.target }}/release/veha-edge" "${{ matrix.artifact }}"
          else
            cp "target/release/veha-edge" "${{ matrix.artifact }}"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
