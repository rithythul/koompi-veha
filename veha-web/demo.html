<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>veha-web Player Preview</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        h1 {
            text-align: center;
            padding: 20px 0 10px;
            margin: 0;
            font-size: 1.5rem;
            color: #ffffff;
        }
        #player-container {
            width: 800px;
            height: 450px;
            margin: 10px auto;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .controls {
            text-align: center;
            margin: 12px 0;
        }
        .controls button {
            padding: 8px 20px;
            margin: 0 4px;
            border: none;
            border-radius: 4px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .controls button:hover {
            background: #0f3460;
        }
        #status {
            text-align: center;
            padding: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #8899aa;
            max-width: 800px;
            margin: 0 auto;
            word-break: break-all;
        }
        #playlist-input {
            display: block;
            width: 780px;
            margin: 16px auto;
            min-height: 120px;
            padding: 10px;
            background: #0f0f23;
            color: #cccccc;
            border: 1px solid #333;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }
        .load-btn {
            display: block;
            margin: 8px auto;
            padding: 8px 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .load-btn:hover {
            background: #c73e54;
        }
    </style>
</head>
<body>
    <h1>veha-web Player Preview</h1>

    <div id="player-container"></div>

    <div class="controls">
        <button id="btn-prev">Previous</button>
        <button id="btn-play">Play</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-next">Next</button>
    </div>

    <div id="status">No playlist loaded</div>

    <textarea id="playlist-input">{
  "name": "Demo Playlist",
  "items": [
    { "source": "https://www.w3schools.com/html/mov_bbb.mp4", "duration": null, "name": "Big Buck Bunny" },
    { "source": "https://via.placeholder.com/800x450/0000FF/FFFFFF?text=Slide+1", "duration": 3.0, "name": "Blue Slide" },
    { "source": "https://via.placeholder.com/800x450/FF0000/FFFFFF?text=Slide+2", "duration": 3.0, "name": "Red Slide" }
  ],
  "loop_playlist": true
}</textarea>
    <button class="load-btn" id="btn-load">Load Playlist</button>

    <script type="module">
        // Build with: wasm-pack build veha-web --target web --out-dir pkg
        import init, { vehaPlayer } from './pkg/veha_web.js';

        async function start() {
            await init();

            const player = new vehaPlayer('player-container');

            // Wire up controls
            document.getElementById('btn-prev').addEventListener('click', () => player.previous());
            document.getElementById('btn-play').addEventListener('click', () => player.play());
            document.getElementById('btn-pause').addEventListener('click', () => player.pause());
            document.getElementById('btn-next').addEventListener('click', () => player.next());

            document.getElementById('btn-load').addEventListener('click', () => {
                const json = document.getElementById('playlist-input').value;
                try {
                    player.load_playlist(json);
                    player.play();
                } catch (e) {
                    alert('Failed to load playlist: ' + e);
                }
            });

            // Handle the custom auto-advance event dispatched by the WASM module
            document.addEventListener('veha-advance', () => {
                player.next();
            });

            // Periodically refresh the status display
            setInterval(() => {
                document.getElementById('status').textContent = player.get_status();
            }, 500);

            // Expose for console debugging
            window.player = player;
        }

        start().catch(e => console.error('Failed to initialize veha-web:', e));
    </script>
</body>
</html>
