name: Release veha-edge

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: veha-edge-x86_64-linux
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            artifact: veha-edge-aarch64-linux
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install FFmpeg dev libs (x86_64 only)
        if: matrix.use_cross == false
        run: sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Install cross (aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native x86_64)
        if: matrix.use_cross == false
        run: cargo build --release -p veha-edge

      - name: Build (cross aarch64)
        if: matrix.use_cross == true
        run: cross build --release -p veha-edge --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          if [ -f "target/${{ matrix.target }}/release/veha-edge" ]; then
            cp "target/${{ matrix.target }}/release/veha-edge" "${{ matrix.artifact }}"
          else
            cp "target/release/veha-edge" "${{ matrix.artifact }}"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
